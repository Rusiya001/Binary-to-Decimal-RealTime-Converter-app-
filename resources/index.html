<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Binary to Decimal</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="container" id="container"> 
      <div class="heading">
        <h1>Enter Binary Value: </h1>
      </div>

      <div class="inputBox">
         <input type="text" id="binaryInput" placeholder="Type the value here" />
      </div>

      <div class="errorMsg" id="errorMsg" style="display:none;">
         <p>Please enter a valid binary number (only 0s and 1s)</p>
      </div>

      <div class="topic">
        <p>Decimal</p>
      </div>

      <div class="outputBox">
         <p id="result">-</p>
      </div>

      <div class="copyBox">
        <button id="copyBtn" style="display:none;"">Copy</button>
      </div>
    </div>
    <script src="/js/neutralino.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
